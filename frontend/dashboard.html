<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spider Symbiote — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #cc0000;
      --primary-dark: #990000;
      --accent: #ff2222;
      --dark: #0a0a0a;
      --darker: #050505;
      --light: #f0f0f0;
      --gray: #555555;
      --gray-light: #aaaaaa;
      --card-bg: #111111;
      --card-border: #2a0000;
      --glow: rgba(204,0,0,0.35);
      --success: #22cc55;
      --danger: #ff4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--darker);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .web-lines {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.05;
      background-image:
        repeating-linear-gradient(45deg, #cc0000 0px, #cc0000 1px, transparent 1px, transparent 60px),
        repeating-linear-gradient(-45deg, #cc0000 0px, #cc0000 1px, transparent 1px, transparent 60px);
    }
    header {
      padding: 1.4rem 2rem;
      background: rgba(10,10,10,0.97);
      border-bottom: 2px solid var(--card-border);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 20px var(--glow);
      position: relative; z-index: 5;
    }
    .logo {
      display: flex; align-items: center; gap: 0.75rem;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.7rem; font-weight: 700; letter-spacing: 2px; color: var(--light);
    }
    .logo .spider-icon { color: var(--primary); font-size: 1.9rem; filter: drop-shadow(0 0 8px var(--primary)); }
    .list-container {
      padding: 2rem; flex: 1;
      max-width: 800px; margin: 0 auto; width: 100%;
      position: relative; z-index: 1;
    }
    .dashboard-header {
      text-align: center; margin-bottom: 2rem;
      padding-bottom: 1.2rem; border-bottom: 1px solid var(--card-border);
    }
    .dashboard-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem; font-weight: 700; letter-spacing: 1.5px;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .dashboard-title i { color: var(--primary); }
    .pair-count {
      text-align: center; font-size: 1rem; margin-bottom: 1.5rem;
      color: var(--gray-light);
      background: var(--card-bg);
      padding: 0.7rem 1rem; border-radius: 8px;
      border: 1px solid var(--card-border);
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .pair-count i { color: var(--primary); }
    .number-card {
      background: var(--card-bg); border-radius: 12px;
      padding: 1.2rem 1.5rem; margin: 1rem auto;
      display: flex; justify-content: space-between; align-items: center;
      border: 1px solid var(--card-border);
      transition: all 0.2s; max-width: 550px;
      position: relative;
    }
    .number-card::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--primary); border-radius: 12px 0 0 12px;
    }
    .number-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px var(--glow); }
    .number-text {
      font-size: 1rem; font-weight: 600;
      display: flex; align-items: center; gap: 0.5rem;
      font-family: 'Rajdhani', sans-serif; letter-spacing: 1px;
    }
    .number-text i { color: var(--primary); }
    .delete-btn {
      background: rgba(204,0,0,0.12);
      color: var(--danger); border: 1px solid rgba(204,0,0,0.4);
      border-radius: 8px; padding: 0.5rem 1rem;
      cursor: pointer; font-weight: 600;
      display: flex; align-items: center; gap: 0.5rem;
      transition: all 0.2s; font-size: 0.85rem;
    }
    .delete-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }
    .delete-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .add-button {
      position: fixed; bottom: 30px; right: 30px;
      background-color: var(--primary); color: white;
      font-size: 1.4rem; width: 58px; height: 58px;
      border-radius: 50%; border: none; cursor: pointer;
      box-shadow: 0 4px 20px var(--glow);
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .add-button:hover { transform: scale(1.1); background-color: var(--accent); }
    footer {
      text-align: center; padding: 1.2rem; font-size: 0.8rem;
      color: var(--gray); background: rgba(10,10,10,0.97);
      border-top: 1px solid var(--card-border);
      position: relative; z-index: 5;
    }
    footer span { color: var(--primary); }
    .empty-msg {
      text-align: center; color: var(--gray);
      margin-top: 2rem; padding: 2.5rem;
      background: var(--card-bg); border-radius: 16px;
      border: 1px dashed var(--card-border);
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
    }
    .empty-msg i { font-size: 2.5rem; color: var(--primary); opacity: 0.6; }
    @media (max-width: 480px) {
      .list-container { padding: 1.5rem 1rem; }
      .number-card { flex-direction: column; gap: 1rem; text-align: center; }
      .number-card::before { display: none; }
    }
  </style>
</head>
<body>
  <div class="web-lines"></div>
  <header>
    <div class="logo">
      <i class="fas fa-spider spider-icon"></i>
      <span>SPIDER SYMBIOTE WEB</span>
    </div>
  </header>

  <div class="list-container">
    <div class="dashboard-header">
      <h2 class="dashboard-title">
        <i class="fas fa-list"></i>
        YOUR PAIRINGS
      </h2>
    </div>

    <div class="pair-count" id="pairCount">
      <i class="fas fa-spinner fa-spin"></i>
      <span>Loading...</span>
    </div>

    <div id="pairedList"></div>
  </div>

  <button class="add-button" onclick="window.location.href='/home'" title="Add new pairing">
    <i class="fas fa-plus"></i>
  </button>

  <footer>
    <i class="fas fa-spider" style="color:var(--primary)"></i>
    &copy; 2025 <span>Spider Symbiote System</span>
  </footer>

  <script>
    function loadUserPairings() {
      fetch('/me')
        .then(res => {
          if (!res.ok) { window.location.href = '/login.html'; return; }
          return res.json();
        })
        .then(data => {
          if (!data) return;
          const numbers = data.pairings || [];
          document.getElementById("pairCount").innerHTML =
            `<i class="fas fa-spider"></i> ${numbers.length}/2 numbers paired`;

          const list = document.getElementById("pairedList");
          list.innerHTML = "";

          if (numbers.length === 0) {
            list.innerHTML = `
              <div class="empty-msg">
                <i class="fas fa-spider"></i>
                <div>🕸️ No pairings yet. Click <b>+</b> to get started.</div>
              </div>`;
            return;
          }

          numbers.forEach(num => {
            const div = document.createElement("div");
            div.className = "number-card";

            const span = document.createElement("span");
            span.className = "number-text";
            span.innerHTML = `<i class="fas fa-phone-alt"></i> +${num}`;

            const btn = document.createElement("button");
            btn.className = "delete-btn";
            btn.innerHTML = `<i class="fas fa-trash"></i> Delete`;
            btn.onclick = () => {
              if (!confirm(`Delete pairing for +${num}?`)) return;
              btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;
              btn.disabled = true;
              fetch(`/paired/${num}`, { method: "DELETE" })
                .then(r => r.json())
                .then(resp => {
                  if (resp.status) loadUserPairings();
                  else { alert("Failed to delete: " + (resp.message || 'Unknown error')); btn.innerHTML = `<i class="fas fa-trash"></i> Delete`; btn.disabled = false; }
                })
                .catch(() => { alert("Error deleting number."); btn.innerHTML = `<i class="fas fa-trash"></i> Delete`; btn.disabled = false; });
            };

            div.appendChild(span);
            div.appendChild(btn);
            list.appendChild(div);
          });
        })
        .catch(() => {
          document.getElementById("pairedList").innerHTML = `
            <div class="empty-msg">
              <i class="fas fa-exclamation-triangle" style="color:var(--danger)"></i>
              <div>Failed to load pairings. Please refresh.</div>
            </div>`;
        });
    }
    loadUserPairings();
  </script>
</body>
</html>
