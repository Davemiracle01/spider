<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spider Symbiote — Pairing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #cc0000;
      --primary-dark: #990000;
      --accent: #ff2222;
      --dark: #0a0a0a;
      --darker: #050505;
      --light: #f0f0f0;
      --gray: #555555;
      --gray-light: #aaaaaa;
      --card-bg: #111111;
      --card-border: #2a0000;
      --glow: rgba(204,0,0,0.35);
      --success: #22cc55;
      --danger: #ff4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--darker);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .web-lines {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.05;
      background-image:
        repeating-linear-gradient(45deg, #cc0000 0px, #cc0000 1px, transparent 1px, transparent 60px),
        repeating-linear-gradient(-45deg, #cc0000 0px, #cc0000 1px, transparent 1px, transparent 60px);
    }
    header {
      padding: 1.4rem 2rem;
      background: rgba(10,10,10,0.97);
      border-bottom: 2px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 20px var(--glow);
      position: relative; z-index: 5;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--light);
    }
    .logo .spider-icon { color: var(--primary); font-size: 1.9rem; filter: drop-shadow(0 0 8px var(--primary)); }
    .container {
      padding: 2rem;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative; z-index: 1;
    }
    .card {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 2.2rem;
      border: 1px solid var(--card-border);
      box-shadow: 0 0 40px var(--glow), 0 8px 32px rgba(0,0,0,0.6);
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      border-radius: 16px 16px 0 0;
    }
    .card-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--card-border);
    }
    .card-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .card-title i { color: var(--primary); }
    .form-group { margin-bottom: 1.5rem; }
    .form-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .form-label i { color: var(--primary); }
    .form-input {
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: #0d0d0d;
      color: var(--light);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: all 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(204,0,0,0.2);
    }
    .form-input::placeholder { color: var(--gray); }
    .form-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.9rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      letter-spacing: 1.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
      width: 100%;
      text-transform: uppercase;
    }
    .form-btn:hover {
      background: var(--accent);
      box-shadow: 0 4px 20px var(--glow);
      transform: translateY(-2px);
    }
    .result-box {
      margin-top: 1.5rem;
      padding: 1.5rem;
      background: #0d0d0d;
      border-radius: 8px;
      min-height: 100px;
      font-family: monospace;
      font-size: 0.9rem;
      border: 1px solid var(--card-border);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .success { color: var(--success); }
    .error { color: var(--danger); }
    .loading { display: flex; align-items: center; gap: 0.5rem; color: var(--gray-light); }
    .loading i { animation: spin 1s linear infinite; }
    @keyframes spin { 0%{transform:rotate(0deg)}100%{transform:rotate(360deg)} }
    .code-display {
      margin-top: 1rem;
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      color: var(--primary);
      letter-spacing: 6px;
      font-family: 'Rajdhani', sans-serif;
      text-shadow: 0 0 12px var(--glow);
    }
    .dashboard-btn {
      position: fixed;
      bottom: 30px; right: 30px;
      width: 58px; height: 58px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      box-shadow: 0 4px 20px var(--glow);
      cursor: pointer;
      transition: all 0.2s;
      z-index: 100;
      border: none;
    }
    .dashboard-btn:hover { background: var(--accent); transform: scale(1.08); }
    footer {
      text-align: center;
      padding: 1.2rem;
      font-size: 0.8rem;
      color: var(--gray);
      background: rgba(10,10,10,0.97);
      border-top: 1px solid var(--card-border);
      position: relative; z-index: 5;
    }
    footer span { color: var(--primary); }
    @media (max-width: 768px) {
      .container { padding: 1rem; }
      .card { padding: 1.5rem; }
      .dashboard-btn { bottom: 20px; right: 20px; width: 50px; height: 50px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="web-lines"></div>
  <header>
    <div class="logo">
      <i class="fas fa-spider spider-icon"></i>
      <span>SPIDER SYMBIOTE PAIRING</span>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">
          <i class="fas fa-qrcode"></i>
          GET PAIRING CODE
        </h2>
      </div>

      <div class="form-group">
        <label class="form-label" for="number">
          <i class="fas fa-phone"></i> Phone Number:
        </label>
        <input class="form-input" type="text" id="number" placeholder="e.g., 23490123..." inputmode="numeric"/>
      </div>

      <div class="form-group">
        <button class="form-btn" onclick="startPair()">
          <i class="fas fa-spider"></i> GET PAIR CODE
        </button>
      </div>

      <div id="output" class="result-box">
        <span style="color:var(--gray)">🕸️ Waiting for input...</span>
      </div>
    </div>
  </div>

  <button class="dashboard-btn" onclick="window.location.href='/dashboard'" title="Dashboard">
    <i class="fas fa-home"></i>
  </button>

  <footer>
    <i class="fas fa-spider" style="color:var(--primary)"></i>
    &copy; 2025 <span>Spider Symbiote System</span>
  </footer>

  <script>
    function startPair() {
      const num = document.getElementById('number').value.trim().replace(/\s+/g,'').replace(/^\+/,'');
      const output = document.getElementById('output');

      if (!num || !/^\d{8,15}$/.test(num)) {
        output.innerHTML = `<div class="error"><i class="fas fa-exclamation-circle"></i> Enter a valid number (8–15 digits, include country code).</div>`;
        return;
      }

      output.innerHTML = `<div class="loading"><i class="fas fa-spinner"></i> 🕸️ Weaving connection...</div>`;

      fetch(`/pair?number=${num}`)
        .then(res => {
          if (!res.ok) return res.text().then(t => { throw new Error(t); });
          output.innerHTML = `<div class="loading"><i class="fas fa-spinner"></i> 🕷️ Pair started — fetching code...</div>`;
          pollCode();
        })
        .catch(err => {
          output.innerHTML = `<div class="error"><i class="fas fa-exclamation-circle"></i> ${err.message || 'Failed to start pairing. Try again.'}</div>`;
        });
    }

    function pollCode() {
      let attempts = 0;
      const MAX = 30;
      const poll = setInterval(() => {
        attempts++;
        if (attempts > MAX) {
          clearInterval(poll);
          document.getElementById('output').innerHTML = `<div class="error"><i class="fas fa-clock"></i> Timed out waiting for pairing code. Please try again.</div>`;
          return;
        }
        fetch("/pairing-code")
          .then(res => res.json())
          .then(data => {
            if (data.code) {
              clearInterval(poll);
              document.getElementById('output').innerHTML =
                `<div class="success"><i class="fas fa-check-circle"></i> Pairing Code for ${data.number || "your number"}:</div>
                 <div class="code-display">${data.code}</div>
                 <div style="margin-top:1rem;font-size:0.8rem;color:var(--gray-light);text-align:center">Enter this code in WhatsApp → Linked Devices → Link with phone number</div>`;
            }
          })
          .catch(() => {});
      }, 2000);
    }

    document.getElementById('number').addEventListener('keypress', e => { if (e.key === 'Enter') startPair(); });
  </script>
</body>
</html>
