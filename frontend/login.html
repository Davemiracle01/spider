<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spider Symbiote — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #cc0000;
      --primary-dark: #990000;
      --secondary: #1a1a1a;
      --accent: #ff2222;
      --web: #888888;
      --dark: #0a0a0a;
      --darker: #050505;
      --light: #f0f0f0;
      --gray: #555555;
      --gray-light: #aaaaaa;
      --card-bg: #111111;
      --card-border: #2a0000;
      --glow: rgba(204,0,0,0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--darker);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow-x: hidden;
    }
    /* Web pattern background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(180,0,0,0.08) 0%, transparent 60%),
        radial-gradient(circle at 80% 70%, rgba(100,0,0,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .web-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.06;
      background-image:
        repeating-linear-gradient(45deg, #cc0000 0px, #cc0000 1px, transparent 1px, transparent 60px),
        repeating-linear-gradient(-45deg, #cc0000 0px, #cc0000 1px, transparent 1px, transparent 60px);
    }
    header {
      padding: 1.4rem 2rem;
      background: rgba(10,10,10,0.95);
      border-bottom: 2px solid var(--card-border);
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 20px var(--glow);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--light);
    }
    .logo .spider-icon { color: var(--primary); font-size: 1.8rem; filter: drop-shadow(0 0 8px var(--primary)); }
    .logo span { text-shadow: 0 0 12px rgba(204,0,0,0.5); }
    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      border: 1px solid var(--card-border);
      box-shadow: 0 0 40px var(--glow), 0 8px 32px rgba(0,0,0,0.6);
      margin-top: 5rem;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      border-radius: 16px 16px 0 0;
    }
    .card-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--card-border);
    }
    .card-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--light);
    }
    .card-title i { color: var(--primary); }
    .card-subtitle {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--gray-light);
      font-style: italic;
    }
    .tabs {
      display: flex;
      margin-bottom: 1.5rem;
      border-radius: 8px;
      overflow: hidden;
      background: var(--dark);
      border: 1px solid var(--card-border);
    }
    .tab {
      flex: 1;
      padding: 0.75rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 1px;
      font-size: 0.95rem;
    }
    .tab.active { background: var(--primary); color: white; }
    .tab:hover:not(.active) { background: #1a0000; }
    .form-group { margin-bottom: 1.4rem; }
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    .form-label i { color: var(--primary); }
    .form-input {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: #0d0d0d;
      color: var(--light);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: all 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(204,0,0,0.2);
    }
    .form-input::placeholder { color: var(--gray); }
    .form-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.9rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      letter-spacing: 1.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
      width: 100%;
      text-transform: uppercase;
    }
    .form-btn:hover {
      background: var(--accent);
      box-shadow: 0 4px 20px var(--glow);
      transform: translateY(-2px);
    }
    .form-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 8px;
      background: rgba(204,0,0,0.12);
      color: #ff5555;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(204,0,0,0.3);
    }
    footer {
      text-align: center;
      padding: 1.2rem;
      font-size: 0.8rem;
      color: var(--gray);
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(10,10,10,0.95);
      border-top: 1px solid var(--card-border);
      z-index: 10;
    }
    footer span { color: var(--primary); }
    @media (max-width: 480px) {
      .login-card { margin: 5.5rem 1rem 4rem; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="web-lines"></div>
  <header>
    <div class="logo">
      <i class="fas fa-spider spider-icon"></i>
      <span>SPIDER SYMBIOTE</span>
    </div>
  </header>

  <div class="login-card">
    <div class="card-header">
      <h2 class="card-title">
        <i class="fas fa-user-shield"></i>
        User Authentication
      </h2>
      <p class="card-subtitle">🕸️ "With great power comes great responsibility"</p>
    </div>

    <div class="tabs">
      <div class="tab active" id="tab-login">Login</div>
      <div class="tab" id="tab-register">Create Account</div>
    </div>

    <div class="form-group">
      <label class="form-label" for="username">
        <i class="fas fa-user"></i> Username:
      </label>
      <input class="form-input" type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">
        <i class="fas fa-lock"></i> Password:
      </label>
      <input class="form-input" type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
    </div>

    <button class="form-btn" id="submit-btn">
      <i class="fas fa-sign-in-alt"></i> LOGIN
    </button>

    <div class="error-msg" id="error" style="display:none;">
      <i class="fas fa-exclamation-circle"></i>
      <span id="error-text"></span>
    </div>
  </div>

  <footer>
    <i class="fas fa-spider" style="color:var(--primary)"></i>
    &copy; 2025 <span>Spider Symbiote System</span> — All Rights Reserved
  </footer>

  <script>
    let mode = "login";

    document.getElementById("tab-login").onclick = () => { mode = "login"; setActiveTab(); };
    document.getElementById("tab-register").onclick = () => { mode = "register"; setActiveTab(); };

    function setActiveTab() {
      document.getElementById("tab-login").classList.toggle("active", mode === "login");
      document.getElementById("tab-register").classList.toggle("active", mode === "register");
      const btn = document.getElementById("submit-btn");
      btn.innerHTML = mode === "login"
        ? '<i class="fas fa-sign-in-alt"></i> LOGIN'
        : '<i class="fas fa-user-plus"></i> CREATE ACCOUNT';
    }

    function showError(msg) {
      const el = document.getElementById("error");
      document.getElementById("error-text").textContent = msg;
      el.style.display = "flex";
    }
    function hideError() { document.getElementById("error").style.display = "none"; }

    function submit() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      hideError();
      if (!user || !pass) return showError("Both fields are required.");

      const btn = document.getElementById("submit-btn");
      const orig = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
      btn.disabled = true;

      fetch(mode === "login" ? "/login" : "/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: user, password: pass }),
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) window.location.href = "/dashboard";
        else showError("❌ " + (data.message || "Invalid credentials."));
      })
      .catch(() => showError("Something went wrong. Try again."))
      .finally(() => { btn.innerHTML = orig; btn.disabled = false; });
    }

    document.getElementById("submit-btn").addEventListener("click", submit);
    ["username","password"].forEach(id => {
      document.getElementById(id).addEventListener("keypress", e => { if (e.key === "Enter") submit(); });
    });
  </script>
</body>
</html>
