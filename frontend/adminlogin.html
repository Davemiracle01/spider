<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spider Symbiote — Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #cc0000; --primary-dark: #990000; --accent: #ff2222;
      --dark: #0a0a0a; --darker: #050505; --light: #f0f0f0;
      --gray: #555555; --gray-light: #aaaaaa;
      --card-bg: #111111; --card-border: #2a0000; --glow: rgba(204,0,0,0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; background: var(--darker); color: var(--light);
      min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .web-lines {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.05;
      background-image: repeating-linear-gradient(45deg, #cc0000 0px, #cc0000 1px, transparent 1px, transparent 60px),
        repeating-linear-gradient(-45deg, #cc0000 0px, #cc0000 1px, transparent 1px, transparent 60px);
    }
    header {
      padding: 1.4rem 2rem; background: rgba(10,10,10,0.97); border-bottom: 2px solid var(--card-border);
      width: 100%; display: flex; align-items: center; justify-content: center;
      position: fixed; top: 0; z-index: 10; box-shadow: 0 2px 20px var(--glow);
    }
    .logo { display: flex; align-items: center; gap: 0.75rem; font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: 2px; }
    .logo .spider-icon { color: var(--primary); font-size: 1.8rem; filter: drop-shadow(0 0 8px var(--primary)); }
    .login-card {
      position: relative; z-index: 1; width: 100%; max-width: 420px;
      background: var(--card-bg); border-radius: 16px; padding: 2.5rem 2rem;
      border: 1px solid var(--card-border); box-shadow: 0 0 40px var(--glow), 0 8px 32px rgba(0,0,0,0.6); margin-top: 5rem;
    }
    .login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--primary), transparent); border-radius: 16px 16px 0 0; }
    .card-header { text-align: center; margin-bottom: 2rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--card-border); }
    .card-title { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: 1.5px; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .card-title i { color: var(--primary); }
    .badge { background: rgba(204,0,0,0.15); border: 1px solid rgba(204,0,0,0.4); color: var(--primary); border-radius: 20px; padding: 0.2rem 0.75rem; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; margin-top: 0.5rem; display: inline-block; }
    .form-group { margin-bottom: 1.4rem; }
    .form-label { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; }
    .form-label i { color: var(--primary); }
    .form-input { width: 100%; padding: 0.85rem 1rem; border-radius: 8px; border: 1px solid var(--card-border); background: #0d0d0d; color: var(--light); font-family: 'Inter', sans-serif; font-size: 0.95rem; transition: all 0.2s; }
    .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(204,0,0,0.2); }
    .form-input::placeholder { color: var(--gray); }
    .form-btn { background: var(--primary); color: white; border: none; padding: 0.9rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: 700; font-family: 'Rajdhani', sans-serif; font-size: 1rem; letter-spacing: 1.5px; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s; width: 100%; text-transform: uppercase; }
    .form-btn:hover { background: var(--accent); box-shadow: 0 4px 20px var(--glow); transform: translateY(-2px); }
    .form-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg { margin-top: 1rem; padding: 0.75rem; border-radius: 8px; background: rgba(204,0,0,0.12); color: #ff5555; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; border: 1px solid rgba(204,0,0,0.3); }
    footer { text-align: center; padding: 1.2rem; font-size: 0.8rem; color: var(--gray); position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.97); border-top: 1px solid var(--card-border); z-index: 10; }
    footer span { color: var(--primary); }
  </style>
</head>
<body>
  <div class="web-lines"></div>
  <header>
    <div class="logo">
      <i class="fas fa-spider spider-icon"></i>
      <span>SPIDER SYMBIOTE</span>
    </div>
  </header>

  <div class="login-card">
    <div class="card-header">
      <h2 class="card-title"><i class="fas fa-shield-alt"></i> Admin Access</h2>
      <span class="badge">RESTRICTED</span>
    </div>
    <div class="form-group">
      <label class="form-label" for="username"><i class="fas fa-user-secret"></i> Admin Username:</label>
      <input class="form-input" type="text" id="username" placeholder="Enter admin username" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="password"><i class="fas fa-key"></i> Admin Password:</label>
      <input class="form-input" type="password" id="password" placeholder="Enter admin password" autocomplete="current-password"/>
    </div>
    <button class="form-btn" id="login-btn"><i class="fas fa-lock-open"></i> ACCESS ADMIN</button>
    <div class="error-msg" id="error" style="display:none;">
      <i class="fas fa-exclamation-circle"></i>
      <span id="error-text"></span>
    </div>
  </div>

  <footer><i class="fas fa-spider" style="color:var(--primary)"></i> &copy; 2025 <span>Spider Symbiote Admin</span></footer>

  <script>
    function submit() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      document.getElementById("error").style.display = "none";
      if (!user || !pass) { document.getElementById("error-text").textContent = "Both fields required."; document.getElementById("error").style.display = "flex"; return; }
      const btn = document.getElementById("login-btn");
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...'; btn.disabled = true;
      fetch("/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: user, password: pass })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) window.location.href = "/admin";
        else { document.getElementById("error-text").textContent = "❌ " + (data.message || "Invalid credentials."); document.getElementById("error").style.display = "flex"; }
      })
      .catch(() => { document.getElementById("error-text").textContent = "Something went wrong."; document.getElementById("error").style.display = "flex"; })
      .finally(() => { btn.innerHTML = '<i class="fas fa-lock-open"></i> ACCESS ADMIN'; btn.disabled = false; });
    }
    document.getElementById("login-btn").addEventListener("click", submit);
    ["username","password"].forEach(id => { document.getElementById(id).addEventListener("keypress", e => { if (e.key === "Enter") submit(); }); });
  </script>
</body>
</html>
